pre-commit:
  parallel: true
  commands:
    gitleaks:
      run: gitleaks protect --staged --no-banner
      skip:
        - merge

    oxlint:
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc}"
      run: pnpm fix:oxlint {staged_files}
      stage_fixed: true

    oxfmt:
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc}"
      run: pnpm fix:oxfmt {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    lint:
      run: pnpm lint

    typecheck:
      run: pnpm typecheck

    test:
      run: pnpm test

    lingui-check:
      run: |
        pnpm lingui:extract
        pnpm lingui:compile
        ./scripts/lingui-check.sh
        ./scripts/i18n-check-key-equals-translation.sh
        git diff ./src/lib/i18n/locales/ || echo "Warning: lingui compilation produced unexpected changes"
